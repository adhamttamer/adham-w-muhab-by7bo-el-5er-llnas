<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>landing page</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
    body{
        height:100vh;
        display:flex;
        justify-content: center;
        align-items: center;
        overflow:hidden;
    background: linear-gradient(135deg, #050816 0%, #0d1b2a 100%, #1b263b);
    }    
    .stars{
        position:absolute;
        width:100%;
        height:100%;
        background-image:
        radial-gradient(white 1xp,transparent 1xp),
        radial-gradient(white 1xp,transparent 1xp);
        background-size: 50px 50px;
        background-position:0 0, 25px 25px;
        animation:move 25sliner infinite;
        opacity:.4;
    }
    @keyframes move{
        from{
            transform:translateY(0);
        }
        to{
            transform:translateY(50px);
    
        }
    }
    .card{
        width:700px;
        max-width: 90%;
        padding:60px;
        border-radius:25px;
        text-align: center;
        background: rgba(255,255,255,.08);
        backdrop-filter: blur(20px);
        border:1px solid rgba(255,255,255,.15);
        box-shadow:
         0 0 30px rgba(0,255,255,.2),
         0 0 80px rgba(0,140,255,.15);
    }
h1{
    font-size: 60px;
    color:#fff;
    letter-spacing: 5px;
    text-transform: uppercase;
    text-shadow:
     0 0 10px cyan,
     0 0 20px cyan,
     0 0 40px cyan;
animation:glow 2s ease-in-out infinite alternate;
}
@keyframes glow{
    from{
        text-shadow:
        0 0 10px cyan,
        0 0 20px cyan;
    }
    to{
        text-shadow:
        0 0 20px cyan,
        0 0 40px cyan,
        0 0 70px #00aaff;
    }
}
p{
    margin: 20px 0;
    color: #ddd;
    font-size: 20px;
    line-height: 1.6;
}
button{
    padding: 15px 45px;
    font-size: 18px;
    color:#fff;
    border:none;
    cursor:pointer;
    border-radius: 18px;
background: linear-gradient(90deg, #00d4ff 0%, #0066ff 100%);
transition: .3s;
}
button:hover{
   transform: scale(1.08);
   box-shadow: 0 0 20px cyan,
   0 0 50px #0066ff;
}
.footer{
    margin-top: 30px;
    color: #888;
    font-size: 14px;
}
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="card">
        <h1>Welcome</h1>
        <p>This is a landing page with a starry background and a glowing card.</p>
        <button>Get Started</button>
        <div class="footer">© 2026 Muhab w doma. All rights reserved.</div>
</body>
</html>
